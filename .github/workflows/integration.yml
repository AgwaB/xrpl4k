name: Integration Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      rippled:
        image: rippleci/rippled:develop
        ports:
          - 5005:5005
          - 6006:6006
        volumes:
          - ${{ github.workspace }}/docker:/etc/opt/ripple
        options: >-
          --entrypoint bash
          --health-cmd "rippled server_info"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 15
          --health-start-period 10s
        env: {}
    env:
      XRPL_RPC_URL: http://localhost:5005
      XRPL_WS_URL: ws://localhost:6006
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: Wait for rippled
        run: |
          for i in $(seq 1 30); do
            if curl -s -X POST http://localhost:5005 \
              -H "Content-Type: application/json" \
              -d '{"method":"server_info","params":[{}]}' | grep -q '"status"'; then
              echo "rippled is ready"
              break
            fi
            echo "Waiting for rippled... ($i)"
            sleep 2
          done
      - name: Run integration tests
        run: ./gradlew jvmTest -Pintegration --no-daemon

  cross-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - name: JS compilation + tests
        run: ./gradlew jsTest --no-daemon
      - name: Linux Native compilation
        run: ./gradlew linuxX64Test --no-daemon
