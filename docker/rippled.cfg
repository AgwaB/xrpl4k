# rippled standalone config for integration testing
# Based on xrpl-py CI: https://github.com/XRPLF/xrpl-py/blob/main/.ci-config/rippled.cfg

[server]
port_rpc
port_ws

[port_rpc]
port = 5005
ip = 0.0.0.0
admin = 0.0.0.0
protocol = http

[port_ws]
port = 6006
ip = 0.0.0.0
admin = 0.0.0.0
protocol = ws

[node_size]
small

[node_db]
type=NuDB
path=/var/lib/rippled/db/nudb
advisory_delete=0
online_delete=256

[ledger_history]
256

[database_path]
/var/lib/rippled/db

[debug_logfile]
/var/log/rippled/debug.log

[sntp_servers]
time.windows.com
time.apple.com
time.nist.gov
pool.ntp.org

[rpc_startup]
{ "command": "log_level", "severity": "warning" }

[ssl_verify]
0

[voting]
reference_fee = 10
account_reserve = 20000000
owner_reserve = 5000000
